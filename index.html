  <title>Office Pro Academy — Learn Microsoft Office & Office Skills</title>
  <meta name="description" content="A complete, friendly, step-by-step course to take you from beginner to advanced Microsoft Office and professional office-assistant skills." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
  <style>
/* ============================================================================
   OFFICE PRO ACADEMY — Styles
   A clean, friendly, modern look that works on phones and computers.
   ========================================================================= */

:root {
  --brand: #4f46e5;
  --brand-dark: #3730a3;
  --bg: #f5f7fb;
  --card: #ffffff;
  --ink: #1e293b;
  --ink-soft: #64748b;
  --line: #e2e8f0;
  --good: #16a34a;
  --warn: #f59e0b;
  --bad: #ef4444;
  --radius: 16px;
  --shadow: 0 4px 20px rgba(15, 23, 42, 0.06);
  --shadow-lg: 0 10px 40px rgba(15, 23, 42, 0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; }
a { color: var(--brand); }

/* ---------- Top bar ---------- */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 14px;
  padding: 12px 20px;
}
.topbar .logo {
  font-weight: 800; font-size: 18px; letter-spacing: -0.3px;
  display: flex; align-items: center; gap: 9px; cursor: pointer;
}
.topbar .logo .badge {
  background: linear-gradient(135deg, var(--brand), #7c3aed);
  color: #fff; width: 34px; height: 34px; border-radius: 10px;
  display: grid; place-items: center; font-size: 18px;
}
.topbar .spacer { flex: 1; }
.searchbox {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg); border: 1px solid var(--line);
  border-radius: 999px; padding: 8px 14px; min-width: 180px;
}
.searchbox input { border: none; background: none; outline: none; font-size: 14px; width: 100%; color: var(--ink); }
.nav-pill {
  padding: 8px 14px; border-radius: 999px; font-weight: 600; font-size: 14px;
  color: var(--ink-soft);
}
.nav-pill:hover { background: var(--bg); color: var(--ink); }
.nav-pill.active { background: var(--brand); color: #fff; }

/* ---------- Layout ---------- */
.wrap { max-width: 1100px; margin: 0 auto; padding: 28px 20px 80px; }

/* ---------- Hero / dashboard ---------- */
.hero {
  background: linear-gradient(135deg, #4f46e5, #7c3aed 60%, #db2777);
  color: #fff; border-radius: 24px; padding: 36px;
  box-shadow: var(--shadow-lg); margin-bottom: 28px;
  position: relative; overflow: hidden;
}
.hero h1 { font-size: clamp(24px, 4vw, 34px); font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
.hero p { opacity: 0.92; max-width: 560px; font-size: 16px; }
.hero .ring { position: absolute; right: -60px; top: -60px; width: 220px; height: 220px; border-radius: 50%; background: rgba(255,255,255,0.12); }
.hero .ring.two { right: 40px; top: 80px; width: 120px; height: 120px; background: rgba(255,255,255,0.08); }

.progress-summary { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 22px; position: relative; }
.stat {
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.22);
  border-radius: 14px; padding: 14px 18px; backdrop-filter: blur(4px);
}
.stat .num { font-size: 26px; font-weight: 800; }
.stat .lbl { font-size: 12px; opacity: 0.85; text-transform: uppercase; letter-spacing: 0.5px; }

.section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--ink-soft); margin: 30px 0 14px; }

/* ---------- Module cards ---------- */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }
.module-card {
  background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
  padding: 22px; box-shadow: var(--shadow); transition: transform .15s ease, box-shadow .15s ease;
  text-align: left; display: flex; flex-direction: column; gap: 10px;
}
.module-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.module-card .icon { font-size: 30px; width: 56px; height: 56px; border-radius: 14px; display: grid; place-items: center; }
.module-card h3 { font-size: 18px; font-weight: 700; }
.module-card .blurb { color: var(--ink-soft); font-size: 14px; flex: 1; }
.bar { height: 8px; background: var(--line); border-radius: 999px; overflow: hidden; }
.bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--brand), #7c3aed); border-radius: 999px; transition: width .4s ease; }
.module-card .meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--ink-soft); }

/* ---------- Module detail / lesson list ---------- */
.back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--ink-soft); font-weight: 600; font-size: 14px; margin-bottom: 18px; cursor: pointer; }
.back-link:hover { color: var(--brand); }
.module-head { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
.module-head .icon { font-size: 32px; width: 64px; height: 64px; border-radius: 16px; display: grid; place-items: center; }
.module-head h1 { font-size: 26px; font-weight: 800; }

.lesson-row {
  background: var(--card); border: 1px solid var(--line); border-radius: 14px;
  padding: 16px 18px; display: flex; align-items: center; gap: 14px;
  box-shadow: var(--shadow); margin-bottom: 12px; width: 100%; text-align: left;
  transition: border-color .15s ease;
}
.lesson-row:hover { border-color: var(--brand); }
.lesson-row .check {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  border: 2px solid var(--line); display: grid; place-items: center; font-size: 15px; color: transparent;
}
.lesson-row.done .check { background: var(--good); border-color: var(--good); color: #fff; }
.lesson-row .info { flex: 1; }
.lesson-row .info h4 { font-size: 16px; font-weight: 700; }
.lesson-row .info .sub { font-size: 13px; color: var(--ink-soft); display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.level-tag { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.5px; }
.level-Basic { background: #dcfce7; color: #15803d; }
.level-Intermediate { background: #fef3c7; color: #b45309; }
.level-Advanced { background: #fee2e2; color: #b91c1c; }
.lesson-row .arrow { color: var(--ink-soft); font-size: 20px; }

/* ---------- Lesson reader ---------- */
.reader { background: var(--card); border: 1px solid var(--line); border-radius: 20px; padding: 32px; box-shadow: var(--shadow); }
.reader h1 { font-size: 26px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.4px; }
.reader .reader-meta { display: flex; gap: 10px; align-items: center; margin-bottom: 22px; color: var(--ink-soft); font-size: 13px; }
.content h4 { font-size: 17px; margin: 22px 0 8px; color: var(--brand-dark); }
.content p { margin-bottom: 12px; }
.content ul, .content ol { margin: 0 0 14px 22px; }
.content li { margin-bottom: 6px; }
.content code { background: #f1f5f9; padding: 2px 6px; border-radius: 6px; font-size: 13px; color: #be185d; }
.content b { color: var(--ink); }

.lesson-table { width: 100%; border-collapse: collapse; margin: 12px 0 18px; font-size: 14px; }
.lesson-table th { background: var(--brand); color: #fff; text-align: left; padding: 9px 12px; }
.lesson-table td { border: 1px solid var(--line); padding: 9px 12px; }
.lesson-table tr:nth-child(even) td { background: #f8fafc; }

/* boxes */
.box { border-radius: 14px; padding: 18px; margin: 22px 0; }
.box h4 { margin: 0 0 10px; font-size: 15px; display: flex; align-items: center; gap: 8px; }
.box.tips { background: #fffbeb; border: 1px solid #fde68a; }
.box.tips h4 { color: #b45309; }
.box.tips li { margin-bottom: 8px; }
.box.short { background: #eef2ff; border: 1px solid #c7d2fe; }
.box.short h4 { color: var(--brand-dark); }
.box.practice { background: #ecfdf5; border: 1px solid #a7f3d0; }
.box.practice h4 { color: #047857; }
.kbd-row { display: flex; align-items: center; gap: 12px; padding: 7px 0; border-bottom: 1px dashed #c7d2fe; flex-wrap: wrap; }
.kbd-row:last-child { border-bottom: none; }
.kbd { font-family: monospace; background: #fff; border: 1px solid #c7d2fe; border-bottom-width: 2px; border-radius: 7px; padding: 4px 9px; font-size: 13px; font-weight: 700; color: var(--brand-dark); white-space: nowrap; }
.kbd-row .desc { color: var(--ink); font-size: 14px; }

/* ---------- Quiz ---------- */
.quiz { background: var(--card); border: 1px solid var(--line); border-radius: 20px; padding: 28px; box-shadow: var(--shadow); margin-top: 22px; }
.quiz h3 { font-size: 18px; margin-bottom: 4px; }
.quiz .qsub { color: var(--ink-soft); font-size: 14px; margin-bottom: 18px; }
.q-block { margin-bottom: 22px; }
.q-block .q-text { font-weight: 700; margin-bottom: 10px; }
.choice {
  display: block; width: 100%; text-align: left; border: 1.5px solid var(--line);
  border-radius: 12px; padding: 12px 16px; margin-bottom: 9px; font-size: 14px; color: var(--ink);
  transition: all .12s ease; background: #fff;
}
.choice:hover { border-color: var(--brand); background: #f8faff; }
.choice.selected { border-color: var(--brand); background: #eef2ff; }
.choice.correct { border-color: var(--good); background: #dcfce7; }
.choice.wrong { border-color: var(--bad); background: #fee2e2; }
.choice .mark { float: right; font-weight: 800; }

.btn {
  background: var(--brand); color: #fff; padding: 12px 22px; border-radius: 12px;
  font-weight: 700; font-size: 15px; transition: background .15s ease;
}
.btn:hover { background: var(--brand-dark); }
.btn.ghost { background: var(--bg); color: var(--ink); border: 1px solid var(--line); }
.btn.ghost:hover { background: #e9eef6; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; }

.result-banner { border-radius: 14px; padding: 18px; margin-bottom: 18px; font-weight: 700; text-align: center; font-size: 16px; }
.result-banner.pass { background: #dcfce7; color: #15803d; }
.result-banner.fail { background: #fef3c7; color: #b45309; }

/* ---------- Shortcuts page ---------- */
.short-card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow); overflow: hidden; }
.short-card .row { display: flex; align-items: center; gap: 14px; padding: 12px 18px; border-bottom: 1px solid var(--line); }
.short-card .row:last-child { border-bottom: none; }
.short-card .row:hover { background: #f8faff; }
.short-card .row .kbd { min-width: 150px; text-align: center; }

/* ---------- Empty / search ---------- */
.empty { text-align: center; padding: 60px 20px; color: var(--ink-soft); }
.empty .big { font-size: 48px; margin-bottom: 12px; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(120px);
  background: var(--ink); color: #fff; padding: 12px 22px; border-radius: 999px;
  font-weight: 600; font-size: 14px; box-shadow: var(--shadow-lg); z-index: 100;
  transition: transform .3s cubic-bezier(.2,.9,.3,1.2); display: flex; gap: 8px; align-items: center;
}
.toast.show { transform: translateX(-50%) translateY(0); }

.confetti { position: fixed; inset: 0; pointer-events: none; z-index: 200; }

@media (max-width: 640px) {
  .topbar .nav-pill span { display: none; }
  .searchbox { min-width: 44px; }
  .hero { padding: 26px; }
  .reader, .quiz { padding: 20px; }
}

/* When printing the certificate, show only the certificate itself. */
@media print {
  body { background: #fff; }
  body * { visibility: hidden; }
  #cert, #cert * { visibility: visible; }
  #cert { position: absolute; left: 0; top: 0; width: 100%; box-shadow: none; }
}

  </style>
</head>

  <!-- Everything is inlined so this single file works fully offline, on its own. -->
  <script>
/* ============================================================================

   ----------------------------------------------------------------------------
   This file defines every module, lesson, tip, keyboard shortcut and quiz.
   It is plain data so the content is easy to read, edit and extend.

   ========================================================================= */

const OFFICE_CURRICULUM = {

  /* Keyboard shortcuts that work almost everywhere in Office + Windows.
     These also power the searchable "Shortcuts" cheat-sheet screen. */

    { keys: "Ctrl + C", action: "Copy the selected item" },
    { keys: "Ctrl + X", action: "Cut the selected item" },

    { keys: "Ctrl + Shift + V", action: "Paste without formatting (paste as plain text)" },

    { keys: "Ctrl + A", action: "Select everything" },
    { keys: "Ctrl + S", action: "Save — do this constantly!" },
    { keys: "F12", action: "Save As (save a new copy with a new name)" },
    { keys: "Ctrl + P", action: "Print" },
    { keys: "Ctrl + F", action: "Find a word on the page" },
    { keys: "Ctrl + H", action: "Find and Replace" },
    { keys: "Ctrl + B", action: "Bold" },
    { keys: "Ctrl + I", action: "Italic" },
    { keys: "Ctrl + U", action: "Underline" },
    { keys: "Ctrl + Home", action: "Jump to the very top of the document" },
    { keys: "Ctrl + End", action: "Jump to the very bottom of the document" },
    { keys: "Ctrl + Arrow", action: "Move one whole word / cell-edge at a time" },
    { keys: "Shift + Arrow", action: "Select text or cells as you move" },
    { keys: "Alt + Tab", action: "Switch between open programs" },
    { keys: "Windows + D", action: "Show the desktop (minimise everything)" },
    { keys: "Windows + L", action: "Lock your computer when you step away" },
    { keys: "Windows + V", action: "Open clipboard history (copy several things, paste any)" },
    { keys: "PrtScn / Win+Shift+S", action: "Take a screenshot (Snipping Tool)" },
    { keys: "Ctrl + Mouse Wheel", action: "Zoom in and out" }
  ],

  /* A guided "learn ASAP" schedule. Each day points to the lessons to finish.
     ~2 short lessons a day; the whole course in two weeks. */
  fastTrack: {
    title: "Fast-Track to Job-Ready (about 2½ weeks)",
    intro: "Do these lessons in order — about 2 short lessons a day (20–30 minutes). Finish the quiz on each to tick it off. By the end you'll have covered everything an office assistant, coordinator, administrative staffer or executive assistant needs — basics to advanced.",
    days: [
      { day: 1,  focus: "Computer basics + get comfortable",       lessons: ["f0", "f1", "f2"] },
      { day: 2,  focus: "Core moves + start typing practice",       lessons: ["f3", "x1"] },
      { day: 3,  focus: "Word: typing & formatting documents",      lessons: ["w1", "w2"] },
      { day: 4,  focus: "Word: editing, tables & pictures",         lessons: ["w3", "w4"] },
      { day: 5,  focus: "Word: advanced + business writing",        lessons: ["w5", "x2"] },
      { day: 6,  focus: "Excel: the grid & making it readable",     lessons: ["e1", "e2"] },
      { day: 7,  focus: "Excel: formulas that do the maths",        lessons: ["e3", "e4"] },
      { day: 8,  focus: "Excel: lookups, PivotTables & charts",     lessons: ["e5"] },
      { day: 9,  focus: "PowerPoint: build a clean presentation",   lessons: ["p1", "p2"] },
      { day: 10, focus: "Present well + professional email",        lessons: ["p3", "o1"] },
      { day: 11, focus: "Outlook: organise inbox & calendar",       lessons: ["o2", "o3"] },
      { day: 12, focus: "The role + professional communication",    lessons: ["c1", "c2"] },
      { day: 13, focus: "Organising, meetings & customer service",  lessons: ["c3", "c4", "x3"] },
      { day: 14, focus: "Advanced coordinator + equipment & money", lessons: ["c5", "x4", "x5"] },
      { day: 15, focus: "Exec support: calendar/inbox + priorities", lessons: ["ea1", "ea2"] },
      { day: 16, focus: "Projects/events + operations & onboarding",  lessons: ["ea3", "ea4"] },
      { day: 17, focus: "Being a trusted right hand (graduate!)",     lessons: ["ea5"] }
    ]
  },

  modules: [

    /* ====================================================================
       MODULE 1 — FOUNDATIONS
       ================================================================= */
    {
      id: "foundations",
      title: "Office Foundations",
      icon: "🧭",
      color: "#6366f1",
      blurb: "Start here. The core skills every single office program shares — so everything after this feels easy.",
      lessons: [
        {
          id: "f0",
          title: "Computer & Keyboard Basics (Start Here)",
          level: "Basic",
          minutes: 7,
          content: `
            <p>Brand new to computers? Perfect — let's cover the absolute basics first. Once these feel natural, everything else in this course is easy. 😊</p>
            <h4>Using the mouse (or trackpad)</h4>
            <ul>
              <li><b>Left-click</b> (one tap) — selects a thing or presses a button.</li>
              <li><b>Double-click</b> (two quick taps) — opens a file, program, or folder.</li>
              <li><b>Right-click</b> — opens a little menu of extra options. Very useful: when stuck, right-click!</li>
              <li><b>Scroll</b> — the wheel (or two fingers on a trackpad) moves the page up and down.</li>
              <li><b>Drag</b> — hold the left button down while moving, then let go, to move things.</li>
            </ul>
            <h4>The screen &amp; windows</h4>
            <ul>
              <li>The <b>Desktop</b> is your home screen. The <b>Taskbar</b> (usually along the bottom) shows open programs and the Start button.</li>
              <li>Each program opens in a <b>window</b>. Top-right corner: <b>–</b> minimises (hides it), <b>▢</b> resizes, <b>✕</b> closes it.</li>
              <li>You can have many windows open at once and switch between them.</li>
            </ul>
            <h4>The most important keys</h4>
            <ul>
              <li><b>Enter</b> — confirms, or starts a new line.</li>
              <li><b>Spacebar</b> — adds a space (the long key at the bottom).</li>
              <li><b>Backspace</b> — deletes the character to the <i>left</i>; <b>Delete</b> deletes to the right.</li>
              <li><b>Shift</b> — hold it to type a CAPITAL letter or the symbol on a key.</li>
              <li><b>Caps Lock</b> — locks capitals on (press again to turn off).</li>
              <li><b>Tab</b> — jumps forward (between boxes, or indents text).</li>
              <li><b>Ctrl</b> (Control) — held with another key to do shortcuts, like Ctrl+S to save. You'll use these a lot!</li>
              <li><b>Arrow keys</b> — move the cursor up, down, left, right.</li>
            </ul>
            <p>Don't worry about memorising everything — you'll learn by doing throughout this course.</p>
          `,
          tips: [
            "When you're ever unsure what you can do with something, RIGHT-CLICK it — the menu shows your options.",
            "The flashing line where you type is called the 'cursor'. Click where you want it before you type.",
            "Take it slow at first. Speed and confidence come naturally with a little daily practice."
          ],
          shortcuts: [
            { keys: "Shift", action: "Hold for a capital letter or the symbol on a key" },
            { keys: "Backspace", action: "Delete the character to the left" },
            { keys: "Enter", action: "Confirm, or start a new line" }
          ],
          practice: "Open any program (try Notepad or Word). Type your full name, then your address. Use <b>Shift</b> for the capital letters. Press <b>Enter</b> to start a new line between them. Then use <b>Backspace</b> to delete a letter and retype it. Finally, right-click anywhere on the page and see what menu appears.",
          quiz: [
            { q: "What does a DOUBLE-click usually do?", choices: ["Deletes a file", "Opens a file, folder or program", "Closes the window", "Types a capital letter"], answer: 1 },
            { q: "You're unsure what options you have on an item. What's the best thing to try?", choices: ["Turn off the computer", "Right-click it to see a menu of options", "Press the spacebar repeatedly", "Unplug the mouse"], answer: 1 },
            { q: "Which key do you HOLD to type a capital letter?", choices: ["Tab", "Enter", "Shift", "Backspace"], answer: 2 }
          ]
        },
        {
          id: "f1",
          title: "How the Office Ribbon Works",
          level: "Basic",
          minutes: 6,
          content: `
            <p>Every Microsoft Office program (Word, Excel, PowerPoint, Outlook) looks similar on purpose. The strip of buttons across the top is called the <b>Ribbon</b>. Learn it once and you know all of them.</p>
            <h4>The parts of the screen</h4>
            <ul>
              <li><b>Tabs</b> — the words across the very top: <i>Home, Insert, Layout, Review, View</i>. Each tab opens a different set of buttons.</li>
              <li><b>Ribbon</b> — the buttons that appear when you click a tab. <i>Home</i> has the everyday tools (font, colour, bold).</li>
              <li><b>Quick Access Toolbar</b> — the tiny icons in the very top-left corner (Save, Undo, Redo). You can right-click any button and choose "Add to Quick Access Toolbar".</li>
              <li><b>File / Backstage</b> — the coloured <b>File</b> tab on the far left. This is where you Open, Save, Print, and Share.</li>
              <li><b>Status Bar</b> — the thin strip at the very bottom showing page number, word count, and zoom.</li>
            </ul>
            <h4>The golden rule of Office</h4>
            <p><b>Select first, then act.</b> Highlight the text, cell, or picture you want to change <i>before</i> you click a button. The Ribbon only changes the thing that is selected.</p>
          `,
          tips: [
            "Double-click any tab name to hide the Ribbon and get more space. Double-click again to bring it back.",
            "If a button looks greyed-out, it usually means nothing is selected yet.",
            "Hover your mouse over any button for 2 seconds — a little label tells you what it does."

              <li><b>Protect focus time</b> — block periods for deep work; don't let the day fill with back-to-back meetings.</li>
              <li><b>Add buffers</b> — travel time, prep time, and breaks between meetings so the day doesn't collapse when one runs over.</li>
              <li><b>Prioritise</b> — when two things clash, know which matters more (and ask if unsure). Decline or rebook the lesser one politely.</li>
              <li><b>Prepare ahead</b> — for each meeting, ensure your exec has the agenda, documents, and any background they need.</li>
              <li><b>Time zones & travel</b> — always confirm the zone; never book a 7am call the morning after a long flight.</li>

            <h4>Managing the inbox (with permission)</h4>
            <ul>
              <li><b>Triage</b> — flag what's urgent, file what's reference, draft replies for routine messages.</li>
              <li><b>Use folders/categories</b> and rules so important senders never get lost.</li>
              <li><b>Draft on their behalf</b> in their voice; let them approve sensitive replies.</li>
            </ul>
            <h4>Gatekeeping with grace</h4>
            <p>You'll say "no" or "not now" often — do it warmly. "He's fully booked this week; can I help, or shall I find time next week?" You shield your exec without making people feel shut out.</p>
          `,
          tips: [
            "Start each day with a quick 'look-ahead' so your exec knows what's coming and you've spotted any clashes.",
            "Keep a shared, colour-coded calendar so the whole team can see (appropriate) availability.",

          shortcuts: [
            { keys: "Ctrl + 2", action: "Open the Calendar in Outlook" },

            { q: "What's the best way to 'gatekeep' someone you must turn away?", choices: ["Ignore them", "Say no warmly and offer an alternative or help", "Be rude so they go away", "Promise something you can't do"], answer: 1 }

        },
        {

            <p>The admin superpower is that <b>nothing falls through the cracks</b>. That comes from a system, not a good memory.</p>
            <h4>Prioritise with the urgent/important grid</h4>
            <ul>
              <li><b>Urgent + Important</b> → do now.</li>
              <li><b>Important, not urgent</b> → schedule it (this is where good work lives).</li>
              <li><b>Urgent, not important</b> → do quickly or delegate.</li>
              <li><b>Neither</b> → drop it.</li>

            <p>Keep <b>every</b> task in one place — a notebook, Outlook Tasks, Microsoft To Do, or a simple Excel tracker — and review it first thing each morning and last thing each day. A scattered system is no system.</p>
            <h4>Tracking other people's actions</h4>

            { q: "How should you handle following up on what others owe you?", choices: ["Never remind anyone", "Keep a follow-up log and send polite, timely nudges", "Do their work for them", "Complain to everyone"], answer: 1 }

        {

            <p>Coordinators and EAs often run the moving parts of projects and events. The tools: a checklist, a timeline, and clear ownership.</p>

              <li><b>Break it down</b> into tasks with an owner and a due date for each.</li>
              <li><b>Track it</b> in a simple plan (Excel, Planner, or a to-do tool): task · owner · deadline · status.</li>

            <h4>Planning an event or big meeting (e.g. board meeting, off-site, AGM)</h4>

            <h4>The two tools that never fail</h4>
            <p>A <b>checklist with deadlines</b> (so nothing is forgotten) and a <b>run-sheet</b> (so the day runs to time). Master these and you can run anything from a team lunch to a conference.</p>
          `,
          tips: [
            "Always have a Plan B — backup AV, a printed copy of the slides, extra chairs. Things go wrong; prepared people stay calm.",
            "Confirm everything 24–48 hours before (venue, catering numbers, attendees) — confirmations prevent disasters.",
            "Keep a reusable event checklist template; each event makes it better."

          shortcuts: [
            { keys: "Ctrl + T", action: "Make a tracking Table in Excel (filters + auto-fill)" },
            { keys: "Ctrl + Shift + L", action: "Toggle filters to sort your task list" }

          quiz: [
            { q: "What is a 'run-sheet'?", choices: ["A list of attendees", "A timed schedule of exactly what happens when, and who's responsible", "The catering bill", "A type of email"], answer: 1 },
            { q: "What two tools make events and projects run smoothly?", choices: ["A pen and paper only", "A checklist with deadlines and a run-sheet", "Luck and memory", "A bigger budget"], answer: 1 },
            { q: "When should you confirm venue, catering and attendees?", choices: ["Never", "24–48 hours before the event", "A year before only", "During the event"], answer: 1 }

        {
          id: "ea4",

          level: "Intermediate",

          content: `
            <p>Administrative staff keep the office's behind-the-scenes machinery running. Here are the core operational duties.</p>
            <h4>Onboarding new staff</h4>
            <ul>
              <li>Prepare before day one: desk, computer/login, email, building access, welcome pack.</li>

            <ul>
              <li><b>Consistent filing</b> — agreed names and folders, one shared source of truth.</li>

          `,
          tips: [
            "Build an onboarding checklist so every new starter gets a consistent, welcoming first day.",
            "Treat all HR and personal data as strictly confidential — store it securely, share it with no one unauthorised.",

          ],
          shortcuts: [
            { keys: "Windows + L", action: "Lock your screen to protect data when you step away" }
          ],
          quiz: [
            { q: "What should be ready BEFORE a new employee's first day?", choices: ["Nothing", "Desk, computer/login, email, access and a welcome pack", "Only a chair", "Their resignation letter"], answer: 1 },
            { q: "How must personal and HR data be handled?", choices: ["Shared freely", "Kept secure and strictly confidential, per data-protection rules", "Left on the desk", "Emailed to everyone"], answer: 1 },

            <h4>Communicate 'upward' well</h4>

          `,
          tips: [
            "Anticipation is the #1 trait leaders praise — keep a 'what will they need next?' mindset.",
            "Bring a recommendation with every problem you raise; it shows judgement and saves their time.",
            "Confidentiality is built once and lost in a moment — guard it like your reputation, because it is."
          ],
          shortcuts: [],
          quiz: [
            { q: "What single trait do leaders value most in a great assistant?", choices: ["Typing speed", "Anticipating needs before being asked", "Working late", "Knowing gossip"], answer: 1 },
            { q: "How should you raise a problem to a busy executive?", choices: ["Just dump the problem", "Bring the headline AND a suggested solution", "Hide it", "Tell everyone else first"], answer: 1 },
            { q: "Why is discretion so important?", choices: ["It isn't", "You handle confidential information; trust is your reputation and easily lost", "To seem mysterious", "To avoid work"], answer: 1 }

if (typeof window !== "undefined") { window.OFFICE_CURRICULUM = OFFICE_CURRICULUM; }

  </script>
  <script>
/* ============================================================================
   OFFICE PRO ACADEMY — App logic
   A tiny no-framework single-page app. It renders screens, tracks progress
   in the browser (localStorage), runs quizzes, and powers search.
   ========================================================================= */

(function () {
  "use strict";

  const DATA = window.OFFICE_CURRICULUM;
  const STORE_KEY = "officeProAcademy.progress.v1";
  const app = document.getElementById("app");
  const searchInput = document.getElementById("search");

  /* ---------- Progress persistence ---------- */
  function loadProgress() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
    catch (e) { return {}; }
  }
  function saveProgress(p) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(p)); } catch (e) {}
  }
  let progress = loadProgress();
  // shape: { done: { lessonId: true }, quiz: { lessonId: scorePercent } }
  progress.done = progress.done || {};
  progress.quiz = progress.quiz || {};

  function markDone(lessonId) {
    if (!progress.done[lessonId]) {
      progress.done[lessonId] = true;
      saveProgress(progress);
    }
  }
  function setQuizScore(lessonId, pct) {
    progress.quiz[lessonId] = pct;
    saveProgress(progress);
  }

  /* ---------- Helpers ---------- */
  const allLessons = () => DATA.modules.flatMap(m => m.lessons.map(l => ({ ...l, moduleId: m.id, moduleTitle: m.title, color: m.color })));
  const totalLessons = () => allLessons().length;
  const doneCount = () => Object.keys(progress.done).filter(k => progress.done[k]).length;
  const moduleProgress = (m) => {
    const done = m.lessons.filter(l => progress.done[l.id]).length;
    return { done, total: m.lessons.length, pct: Math.round((done / m.lessons.length) * 100) };
  };
  const escapeHtml = (s) => s.replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

  /* ---------- Router (hash based, works offline) ---------- */
  function go(hash) {
    // Any deliberate navigation clears an active search, so clicking a search
    // result actually opens it (instead of render() re-running the search).
    if (searchInput) searchInput.value = "";
    const current = window.location.hash.replace(/^#\/?/, "");
    if (current === hash) render();            // same hash won't fire hashchange — render manually
    else window.location.hash = hash;          // triggers hashchange -> render
  }
  window.addEventListener("hashchange", render);

  function parseHash() {
    const h = window.location.hash.replace(/^#\/?/, "");
    const parts = h.split("/").filter(Boolean);
    return { parts };
  }

  /* ---------- Screens ---------- */

  function renderDashboard() {
    const done = doneCount(), total = totalLessons();
    const pct = total ? Math.round((done / total) * 100) : 0;
    const quizzesTaken = Object.keys(progress.quiz).length;
    const avgScore = quizzesTaken
      ? Math.round(Object.values(progress.quiz).reduce((a, b) => a + b, 0) / quizzesTaken)
      : 0;

    const moduleCards = DATA.modules.map(m => {
      const mp = moduleProgress(m);
      return `
        <button class="module-card" onclick="OPA.go('module/${m.id}')">
          <div class="icon" style="background:${m.color}22;color:${m.color}">${m.icon}</div>
          <h3>${m.title}</h3>
          <div class="blurb">${m.blurb}</div>
          <div class="bar"><span style="width:${mp.pct}%"></span></div>
          <div class="meta"><span>${mp.done} / ${mp.total} lessons</span><span>${mp.pct}%</span></div>
        </button>`;
    }).join("");

    app.innerHTML = `
      <div class="hero">
        <div class="ring"></div><div class="ring two"></div>
        <h1>Welcome to Office Pro Academy 👋</h1>
        <p>Your complete, step-by-step path from total beginner to a confident, skilled office assistant, coordinator, administrative staffer &amp; executive assistant. Learn at your own pace — your progress saves automatically.</p>
        <div class="btn-row" style="margin-top:18px">
          <button class="btn" style="background:#fff;color:var(--brand-dark)" onclick="OPA.go('plan')">🚀 Start the Fast-Track Plan</button>
        </div>
        <p style="opacity:.9;font-size:13.5px;margin-top:12px">New here? It's simple: open a module → read the short lessons & try the practice → pass the quick quiz to tick it off. Totally new to computers? Begin with <b>“Computer &amp; Keyboard Basics”</b> in Office Foundations.</p>
        <div class="progress-summary">
          <div class="stat"><div class="num">${done}/${total}</div><div class="lbl">Lessons done</div></div>
          <div class="stat"><div class="num">${pct}%</div><div class="lbl">Course complete</div></div>
          <div class="stat"><div class="num">${quizzesTaken}</div><div class="lbl">Quizzes taken</div></div>
          <div class="stat"><div class="num">${avgScore}%</div><div class="lbl">Avg quiz score</div></div>
        </div>
      </div>

      <div class="section-title">📚 Your Learning Path — work top to bottom</div>
      <div class="grid">${moduleCards}</div>

      <div class="section-title">🎁 Quick tip of the day</div>
      <div class="reader" style="padding:22px">
        <p style="margin:0">${randomTip()}</p>
      </div>
    `;
  }

  function renderModule(moduleId) {
    const m = DATA.modules.find(x => x.id === moduleId);
    if (!m) return renderNotFound();
    const mp = moduleProgress(m);

    const rows = m.lessons.map((l, i) => {
      const done = !!progress.done[l.id];
      const score = progress.quiz[l.id];
      return `
        <button class="lesson-row ${done ? "done" : ""}" onclick="OPA.go('lesson/${m.id}/${l.id}')">
          <div class="check">✓</div>
          <div class="info">
            <h4>${i + 1}. ${l.title}</h4>
            <div class="sub">
              <span class="level-tag level-${l.level}">${l.level}</span>
              <span>⏱ ${l.minutes} min</span>
              ${score != null ? `<span>📝 Quiz: ${score}%</span>` : ""}
            </div>
          </div>
          <div class="arrow">›</div>
        </button>`;
    }).join("");

    app.innerHTML = `
      <a class="back-link" onclick="OPA.go('')">‹ Back to all modules</a>
      <div class="module-head">
        <div class="icon" style="background:${m.color}22;color:${m.color}">${m.icon}</div>
        <div>
          <h1>${m.title}</h1>
          <div style="color:var(--ink-soft)">${m.blurb}</div>
        </div>
      </div>
      <div class="bar" style="margin:14px 0 6px"><span style="width:${mp.pct}%"></span></div>
      <div class="meta" style="display:flex;justify-content:space-between;color:var(--ink-soft);font-size:13px;margin-bottom:24px">
        <span>${mp.done} of ${mp.total} lessons complete</span><span>${mp.pct}%</span>
      </div>
      ${rows}
      ${examCta(m, mp)}
    `;
  }

  /* The "Final Exam" call-to-action shown at the bottom of each module. */
  function examCta(m, mp) {
    progress.exam = progress.exam || {};
    const score = progress.exam[m.id] || 0;
    const passed = score >= 80;
    const ready = mp.pct === 100;
    return `
      <div class="reader" style="margin-top:18px;padding:22px;text-align:center;${passed ? "border:1px solid #16a34a" : ""}">
        <div style="font-size:30px">${passed ? "🏆" : "🎓"}</div>
        <h3 style="margin:6px 0">${escapeHtml(m.title)} — Final Exam</h3>
        <p style="color:var(--ink-soft);margin-bottom:14px">
          ${passed ? `You passed with <b>${score}%</b>. Great work! You can retake it any time.`
                   : (ready ? "You've finished every lesson — time to prove it! Score 80% to earn this module's badge."
                            : `Finish the lessons first, then take the exam. ${score ? "Best so far: " + score + "%." : ""}`)}
        </p>
        <button class="btn" onclick="OPA.go('exam/${m.id}')">${passed ? "Retake exam" : "Take the Final Exam ›"}</button>
      </div>`;
  }

  function renderLesson(moduleId, lessonId) {
    const m = DATA.modules.find(x => x.id === moduleId);
    if (!m) return renderNotFound();
    const idx = m.lessons.findIndex(l => l.id === lessonId);
    const l = m.lessons[idx];
    if (!l) return renderNotFound();

    const tips = (l.tips && l.tips.length) ? `
      <div class="box tips">
        <h4>💡 Pro Tips &amp; Shortcuts to Remember</h4>
        <ul>${l.tips.map(t => `<li>${t}</li>`).join("")}</ul>
      </div>` : "";

    const shorts = (l.shortcuts && l.shortcuts.length) ? `
      <div class="box short">
        <h4>⌨️ Keyboard Shortcuts in This Lesson</h4>
        ${l.shortcuts.map(s => `<div class="kbd-row"><span class="kbd">${escapeHtml(s.keys)}</span><span class="desc">${s.action}</span></div>`).join("")}
      </div>` : "";

    const practice = l.practice ? `
      <div class="box practice">
        <h4>✍️ Try It Yourself</h4>
        <p style="margin:0">${l.practice}</p>
      </div>` : "";

    const prev = m.lessons[idx - 1];
    const next = m.lessons[idx + 1];

    app.innerHTML = `
      <a class="back-link" onclick="OPA.go('module/${m.id}')">‹ Back to ${escapeHtml(m.title)}</a>
      <div class="reader">
        <h1>${l.title}</h1>
        <div class="reader-meta">
          <span class="level-tag level-${l.level}">${l.level}</span>
          <span>⏱ ${l.minutes} min read</span>
          <span>${m.icon} ${escapeHtml(m.title)}</span>
        </div>
        <div class="content">${l.content}</div>
        ${tips}
        ${shorts}
        ${practice}
      </div>

      ${l.quiz && l.quiz.length ? `<div id="quizMount"></div>` : `
        <div class="btn-row">
          <button class="btn" onclick="OPA.completeLesson('${m.id}','${l.id}')">Mark lesson complete ✓</button>
        </div>`}

      <div class="btn-row" style="margin-top:28px;justify-content:space-between">
        <div>${prev ? `<button class="btn ghost" onclick="OPA.go('lesson/${m.id}/${prev.id}')">‹ Previous</button>` : ""}</div>
        <div>${next ? `<button class="btn ghost" onclick="OPA.go('lesson/${m.id}/${next.id}')">Next ›</button>`
                     : `<button class="btn ghost" onclick="OPA.go('module/${m.id}')">Finish module ✓</button>`}</div>
      </div>
    `;

    if (l.quiz && l.quiz.length) mountQuiz(m, l);
    window.scrollTo(0, 0);
  }

  /* ---------- Quiz engine ---------- */
  function mountQuiz(m, l) {
    const mount = document.getElementById("quizMount");
    const state = { answers: {}, submitted: false };

    function draw() {
      const blocks = l.quiz.map((item, qi) => {
        const chosen = state.answers[qi];
        const choices = item.choices.map((c, ci) => {
          let cls = "choice";
          if (state.submitted) {
            if (ci === item.answer) cls += " correct";
            else if (chosen === ci) cls += " wrong";
          } else if (chosen === ci) cls += " selected";
          const mark = state.submitted
            ? (ci === item.answer ? '<span class="mark">✓</span>' : (chosen === ci ? '<span class="mark">✗</span>' : ""))
            : "";
          return `<button class="${cls}" ${state.submitted ? "disabled" : ""} onclick="OPA._pick(${qi},${ci})">${escapeHtml(c)}${mark}</button>`;
        }).join("");
        return `<div class="q-block"><div class="q-text">${qi + 1}. ${escapeHtml(item.q)}</div>${choices}</div>`;
      }).join("");

      let header = `<h3>📝 Check Your Knowledge</h3><div class="qsub">Answer all ${l.quiz.length} questions to complete this lesson.</div>`;
      let banner = "";
      let footer = `<div class="btn-row"><button class="btn" id="quizSubmit" onclick="OPA._submitQuiz()" ${Object.keys(state.answers).length < l.quiz.length ? "disabled" : ""}>Submit answers</button></div>`;

      if (state.submitted) {
        const correct = l.quiz.filter((it, qi) => state.answers[qi] === it.answer).length;
        const pct = Math.round((correct / l.quiz.length) * 100);
        const pass = pct >= 70;
        banner = `<div class="result-banner ${pass ? "pass" : "fail"}">${pass ? "🎉" : "💪"} You scored ${correct}/${l.quiz.length} (${pct}%). ${pass ? "Lesson complete — great work!" : "Almost! Review the lesson and try again."}</div>`;
        footer = `<div class="btn-row">
          <button class="btn ghost" onclick="OPA._retryQuiz()">Try again</button>
        </div>`;
      }

      mount.innerHTML = `<div class="quiz">${header}${banner}${blocks}${footer}</div>`;
    }

    // expose handlers for this quiz instance
    window.OPA._pick = (qi, ci) => { if (!state.submitted) { state.answers[qi] = ci; draw(); } };
    window.OPA._submitQuiz = () => {
      state.submitted = true;
      const correct = l.quiz.filter((it, qi) => state.answers[qi] === it.answer).length;
      const pct = Math.round((correct / l.quiz.length) * 100);
      setQuizScore(l.id, pct);
      if (pct >= 70) { markDone(l.id); celebrate(); toast("Lesson complete! Progress saved ✓"); }
      draw();
    };
    window.OPA._retryQuiz = () => { state.answers = {}; state.submitted = false; draw(); };

    draw();
  }

  /* ---------- Fast-Track Plan screen ---------- */
  function renderPlan() {
    const ft = DATA.fastTrack;
    const lessonById = {};
    allLessons().forEach(l => { lessonById[l.id] = l; });

    const dayCards = ft.days.map(d => {
      const items = d.lessons.map(id => {
        const l = lessonById[id];
        if (!l) return "";
        const done = !!progress.done[id];
        return `<button class="lesson-row ${done ? "done" : ""}" style="margin-bottom:8px"
                  onclick="OPA.go('lesson/${l.moduleId}/${l.id}')">
                  <div class="check">✓</div>
                  <div class="info"><h4>${l.title}</h4>
                    <div class="sub"><span class="level-tag level-${l.level}">${l.level}</span><span>⏱ ${l.minutes} min</span></div>
                  </div><div class="arrow">›</div>
                </button>`;
      }).join("");
      const dayDone = d.lessons.every(id => progress.done[id]);
      return `
        <div class="reader" style="padding:18px;margin-bottom:14px;${dayDone ? "border:1px solid #16a34a" : ""}">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
            <div style="background:${dayDone ? "#16a34a" : "var(--brand)"};color:#fff;width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-weight:800">${dayDone ? "✓" : "D" + d.day}</div>
            <div><div style="font-weight:800;font-size:16px">Day ${d.day}</div>
            <div style="color:var(--ink-soft);font-size:13px">${d.focus}</div></div>
          </div>
          ${items}
        </div>`;
    }).join("");

    app.innerHTML = `
      <a class="back-link" onclick="OPA.go('')">‹ Back to dashboard</a>
      <div class="module-head">
        <div class="icon" style="background:#4f46e522;color:#4f46e5">🚀</div>
        <div><h1>${ft.title}</h1>
        <div style="color:var(--ink-soft)">${ft.intro}</div></div>
      </div>
      <div style="margin:18px 0">${dayCards}</div>
    `;
    window.scrollTo(0, 0);
  }

  /* ---------- Module Final Exam ---------- */
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
    return a;
  }

  function renderExam(moduleId) {
    const m = DATA.modules.find(x => x.id === moduleId);
    if (!m) return renderNotFound();
    // Pool all quiz questions across the module's lessons.
    const pool = m.lessons.flatMap(l => (l.quiz || []).map(q => ({ ...q })));
    const questions = shuffle(pool).slice(0, Math.min(10, pool.length)); // up to 10 Qs
    const state = { answers: {}, submitted: false };

    function draw() {
      const blocks = questions.map((item, qi) => {
        const chosen = state.answers[qi];
        const choices = item.choices.map((c, ci) => {
          let cls = "choice";
          if (state.submitted) {
            if (ci === item.answer) cls += " correct";
            else if (chosen === ci) cls += " wrong";
          } else if (chosen === ci) cls += " selected";
          const mark = state.submitted ? (ci === item.answer ? '<span class="mark">✓</span>' : (chosen === ci ? '<span class="mark">✗</span>' : "")) : "";
          return `<button class="${cls}" ${state.submitted ? "disabled" : ""} onclick="OPA._examPick(${qi},${ci})">${escapeHtml(c)}${mark}</button>`;
        }).join("");
        return `<div class="q-block"><div class="q-text">${qi + 1}. ${escapeHtml(item.q)}</div>${choices}</div>`;
      }).join("");

      let banner = "";
      let footer = `<div class="btn-row"><button class="btn" onclick="OPA._examSubmit()" ${Object.keys(state.answers).length < questions.length ? "disabled" : ""}>Submit exam</button>
                    <button class="btn ghost" onclick="OPA.go('module/${m.id}')">Back to module</button></div>`;

      if (state.submitted) {
        const correct = questions.filter((it, qi) => state.answers[qi] === it.answer).length;
        const pct = Math.round((correct / questions.length) * 100);
        const pass = pct >= 80;
        banner = `<div class="result-banner ${pass ? "pass" : "fail"}">${pass ? "🏆" : "💪"} Exam score: ${correct}/${questions.length} (${pct}%). ${pass ? "PASSED — module mastered!" : "You need 80% to pass. Review the lessons and try again."}</div>`;
        footer = `<div class="btn-row">
          <button class="btn ghost" onclick="OPA._examRetry()">Retake exam</button>
          ${pass ? `<button class="btn" onclick="OPA.go('certificate')">View your progress / certificate ›</button>` : `<button class="btn" onclick="OPA.go('module/${m.id}')">Back to lessons</button>`}
        </div>`;
      }

      app.innerHTML = `
        <a class="back-link" onclick="OPA.go('module/${m.id}')">‹ Back to ${escapeHtml(m.title)}</a>
        <div class="quiz">
          <h3>🎓 ${escapeHtml(m.title)} — Final Exam</h3>
          <div class="qsub">${questions.length} questions drawn from the whole module. You need <b>80%</b> to pass and earn this module's badge.</div>
          ${banner}${blocks}${footer}
        </div>`;
    }

    window.OPA._examPick = (qi, ci) => { if (!state.submitted) { state.answers[qi] = ci; draw(); } };
    window.OPA._examSubmit = () => {
      state.submitted = true;
      const correct = questions.filter((it, qi) => state.answers[qi] === it.answer).length;
      const pct = Math.round((correct / questions.length) * 100);
      progress.exam = progress.exam || {};
      if (pct > (progress.exam[m.id] || 0)) { progress.exam[m.id] = pct; saveProgress(progress); }
      if (pct >= 80) { celebrate(); toast(m.title + " exam passed! 🏆"); }
      draw();
    };
    window.OPA._examRetry = () => { renderExam(m.id); }; // re-render directly (same-hash nav wouldn't fire)

    draw();
    window.scrollTo(0, 0);
  }

  /* ---------- Certificate ---------- */
  function renderCertificate() {
    progress.exam = progress.exam || {};
    const done = doneCount(), total = totalLessons();
    const examsPassed = DATA.modules.filter(m => (progress.exam[m.id] || 0) >= 80).length;
    const allDone = done === total && examsPassed === DATA.modules.length;
    const name = progress.name || "";

    const moduleStatus = DATA.modules.map(m => {
      const mp = moduleProgress(m);
      const ex = progress.exam[m.id] || 0;
      const passed = ex >= 80;
      return `<div class="short-card" style="margin-bottom:10px"><div class="row">
        <span style="font-size:22px">${m.icon}</span>
        <span style="flex:1"><b>${m.title}</b><br><span style="color:var(--ink-soft);font-size:13px">${mp.done}/${mp.total} lessons · Exam: ${ex ? ex + "%" : "not taken"}</span></span>
        <span class="level-tag ${passed ? "level-Basic" : "level-Advanced"}">${passed ? "✓ Passed" : (mp.pct === 100 ? "Take exam" : "In progress")}</span>
      </div></div>`;
    }).join("");

    app.innerHTML = `
      <a class="back-link" onclick="OPA.go('')">‹ Back to dashboard</a>
      <div class="module-head">
        <div class="icon" style="background:#f59e0b22;color:#f59e0b">🏆</div>
        <div><h1>Your Certificate & Progress</h1>
        <div style="color:var(--ink-soft)">Complete every lesson and pass all ${DATA.modules.length} module exams to earn your certificate.</div></div>
      </div>

      <div style="margin:14px 0 22px">
        <label style="font-weight:600;font-size:14px">Your name on the certificate:</label>
        <input id="certName" type="text" value="${escapeHtml(name)}" placeholder="Type your name…"
          oninput="OPA._setName(this.value)"
          style="display:block;width:100%;max-width:360px;margin-top:6px;padding:10px 14px;border:1px solid var(--line);border-radius:10px;font-size:15px" />
      </div>

      ${allDone ? `
        <div id="cert" style="background:linear-gradient(135deg,#fffbeb,#fef3c7);border:3px solid #f59e0b;border-radius:20px;padding:36px;text-align:center;margin-bottom:18px">
          <div style="font-size:42px">🎓</div>
          <div style="font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#b45309;font-weight:700;margin-top:8px">Certificate of Completion</div>
          <div id="certNameDisplay" style="font-size:28px;font-weight:800;margin:14px 0;color:#1e293b">${escapeHtml(name || "Your Name")}</div>
          <div style="color:#475569">has successfully completed</div>
          <div style="font-size:18px;font-weight:700;margin:6px 0 14px;color:var(--brand-dark)">Office Pro Academy — Microsoft Office &amp; Office Administration</div>
          <div style="color:#475569;font-size:14px">All ${total} lessons &amp; ${DATA.modules.length} module exams passed 🏆</div>
        </div>
        <div class="btn-row"><button class="btn" onclick="window.print()">🖨️ Print / Save as PDF</button></div>
      ` : `
        <div class="result-banner fail">📋 ${done}/${total} lessons done · ${examsPassed}/${DATA.modules.length} module exams passed. Keep going — your certificate unlocks when both are complete!</div>
      `}

      <div class="section-title">Module-by-module status</div>
      ${moduleStatus}
    `;
    window.scrollTo(0, 0);
  }

  /* ---------- Shortcuts cheat-sheet ---------- */
  function renderShortcuts() {
    const rows = DATA.globalShortcuts.map(s =>
      `<div class="row"><span class="kbd">${escapeHtml(s.keys)}</span><span>${s.action}</span></div>`
    ).join("");
    app.innerHTML = `
      <a class="back-link" onclick="OPA.go('')">‹ Back to dashboard</a>
      <div class="module-head">
        <div class="icon" style="background:#4f46e522;color:#4f46e5">⌨️</div>
        <div><h1>Master Shortcut Cheat-Sheet</h1>
        <div style="color:var(--ink-soft)">The shortcuts that work almost everywhere. Learn 5 a week and you'll fly.</div></div>
      </div>
      <div style="margin:18px 0 10px;color:var(--ink-soft);font-size:13px">Tip: use the search box at the top to find any shortcut or lesson.</div>
      <div class="short-card">${rows}</div>
    `;
  }

  /* ---------- Search ---------- */
  function renderSearch(query) {
    const q = query.trim().toLowerCase();
    if (!q) return renderDashboard();

    const lessonHits = allLessons().filter(l =>
      l.title.toLowerCase().includes(q) ||
      l.content.toLowerCase().includes(q) ||
      l.level.toLowerCase().includes(q)
    );
    const shortcutHits = DATA.globalShortcuts.filter(s =>
      s.keys.toLowerCase().includes(q) || s.action.toLowerCase().includes(q)
    );
    // lesson-level shortcuts too
    const lessonShortcutHits = [];
    allLessons().forEach(l => (l.shortcuts || []).forEach(s => {
      if (s.keys.toLowerCase().includes(q) || s.action.toLowerCase().includes(q))
        lessonShortcutHits.push({ ...s, lesson: l });
    }));

    if (!lessonHits.length && !shortcutHits.length && !lessonShortcutHits.length) {
      app.innerHTML = `<div class="empty"><div class="big">🔍</div><h2>No results for "${escapeHtml(query)}"</h2><p>Try a different word, like "save", "Excel", "email" or "Ctrl".</p></div>`;
      return;
    }

    const lessonList = lessonHits.map(l => `
      <button class="lesson-row" onclick="OPA.go('lesson/${l.moduleId}/${l.id}')">
        <div class="check" style="border-color:${l.color}">${progress.done[l.id] ? "✓" : ""}</div>
        <div class="info"><h4>${l.title}</h4>
          <div class="sub"><span class="level-tag level-${l.level}">${l.level}</span><span>${l.moduleTitle}</span></div>
        </div><div class="arrow">›</div>
      </button>`).join("");

    const allShorts = [...shortcutHits.map(s => ({ keys: s.keys, action: s.action })),
                       ...lessonShortcutHits.map(s => ({ keys: s.keys, action: s.action + " — from: " + s.lesson.title }))];
    const shortList = allShorts.map(s =>
      `<div class="row"><span class="kbd">${escapeHtml(s.keys)}</span><span>${escapeHtml(s.action)}</span></div>`
    ).join("");

    app.innerHTML = `
      <a class="back-link" onclick="OPA.clearSearch()">‹ Clear search</a>
      <h1 style="font-size:22px;margin-bottom:18px">Results for "${escapeHtml(query)}"</h1>
      ${lessonHits.length ? `<div class="section-title">📖 Lessons (${lessonHits.length})</div>${lessonList}` : ""}
      ${allShorts.length ? `<div class="section-title">⌨️ Shortcuts (${allShorts.length})</div><div class="short-card">${shortList}</div>` : ""}
    `;
  }

  function renderNotFound() {
    app.innerHTML = `<div class="empty"><div class="big">🤔</div><h2>Page not found</h2><button class="btn" onclick="OPA.go('')">Back to dashboard</button></div>`;
  }

  /* ---------- Effects ---------- */
  let toastTimer;
  function toast(msg) {
    let t = document.getElementById("toast");
    if (!t) { t = document.createElement("div"); t.id = "toast"; t.className = "toast"; document.body.appendChild(t); }
    t.innerHTML = "🎉 " + msg;
    requestAnimationFrame(() => t.classList.add("show"));
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
  }

  function celebrate() {
    const c = document.createElement("div");
    c.className = "confetti";
    document.body.appendChild(c);
    const colors = ["#4f46e5", "#7c3aed", "#db2777", "#16a34a", "#f59e0b"];
    for (let i = 0; i < 60; i++) {
      const p = document.createElement("div");
      const size = 6 + Math.random() * 8;
      p.style.cssText = `position:absolute;top:-20px;left:${Math.random() * 100}%;width:${size}px;height:${size}px;background:${colors[i % colors.length]};border-radius:${Math.random() > .5 ? "50%" : "2px"};opacity:.9;`;
      c.appendChild(p);
      const fall = 600 + Math.random() * 800;
      const drift = (Math.random() - .5) * 200;
      p.animate(
        [{ transform: "translate(0,0) rotate(0)" }, { transform: `translate(${drift}px, ${window.innerHeight + 40}px) rotate(${Math.random() * 720}deg)` }],
        { duration: 1400 + Math.random() * 800, easing: "cubic-bezier(.2,.6,.4,1)" }
      );
    }
    setTimeout(() => c.remove(), 2400);
  }

  const TIPS = [
    "Press <b>Ctrl + S</b> every few minutes. Saving is a habit, not an afterthought.",
    "<b>Ctrl + Z</b> is your best friend — it undoes almost any mistake.",
    "In Excel, <b>Alt + =</b> instantly totals a column of numbers.",
    "Write the email recipient's address <b>last</b> so you never send it half-finished.",
    "Name files with the date first: <code>2026-06-03 Report.docx</code> — they sort themselves.",
    "<b>Windows + L</b> locks your screen instantly when you step away. Always do this.",
    "Use <b>Format Painter</b> (the paintbrush) to copy a look from one place to another.",
    "In a meeting, the gold is the <b>action items</b>: what, who, and by when."
  ];
  function randomTip() { return TIPS[Math.floor(Math.random() * TIPS.length)]; }

  /* ---------- Public API & routing ---------- */
  window.OPA = {
    go,
    completeLesson(mId, lId) { markDone(lId); celebrate(); toast("Lesson complete! Progress saved ✓"); setTimeout(() => go("module/" + mId), 700); },
    clearSearch() { searchInput.value = ""; go(""); },
    _setName(v) { progress.name = v; saveProgress(progress); const el = document.getElementById("certNameDisplay"); if (el) el.textContent = v || "Your Name"; },
    _pick() {}, _submitQuiz() {}, _retryQuiz() {},       // replaced per-quiz
    _examPick() {}, _examSubmit() {}, _examRetry() {}      // replaced per-exam
  };

  function render() {
    if (searchInput.value.trim()) { renderSearch(searchInput.value); updateNav(); return; }
    const { parts } = parseHash();
    if (!parts.length) renderDashboard();
    else if (parts[0] === "module") renderModule(parts[1]);
    else if (parts[0] === "lesson") renderLesson(parts[1], parts[2]);
    else if (parts[0] === "exam") renderExam(parts[1]);
    else if (parts[0] === "plan") renderPlan();
    else if (parts[0] === "certificate") renderCertificate();
    else if (parts[0] === "shortcuts") renderShortcuts();
    else renderNotFound();
    updateNav();
  }

  function updateNav() {
    const h = window.location.hash;
    let current = "home";
    if (h.includes("shortcuts")) current = "shortcuts";
    else if (h.includes("plan")) current = "plan";
    else if (h.includes("certificate")) current = "certificate";
    document.querySelectorAll("[data-nav]").forEach(el => {
      el.classList.toggle("active", el.getAttribute("data-nav") === current && !searchInput.value.trim());
    });
  }

  /* ---------- Search input wiring ---------- */
  let searchTimer;
  searchInput.addEventListener("input", () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => renderSearch(searchInput.value), 150);
  });

  /* ---------- Boot ---------- */
  if (!DATA) {
    app.innerHTML = `<div class="empty"><div class="big">⚠️</div><h2>Could not load the course content.</h2><p>Make sure curriculum.js is in the same folder.</p></div>`;
  } else {
    render();
  }
})();

  </script>
</body>
</html>
